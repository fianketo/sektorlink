<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SektorLink – Pacijenti i hitne poruke</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="theme-color" content="#06b6d4">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SektorLink">

<style>
:root {
  --bg: #f3f6fb;
  --surface: #ffffff;
  --surface2: #f8fafc;
  --border: #e2e8f0;
  --text: #1e293b;
  --text2: #64748b;
  --text3: #94a3b8;
  --primary: #06b6d4;
  --primary-dark: #0891b2;
  --primary-light: #ecfeff;
  --success: #22c55e;
  --success-light: #f0fdf4;
  --warning: #f59e0b;
  --warning-light: #fffbeb;
  --danger: #ef4444;
  --danger-light: #fef2f2;
  --purple: #8b5cf6;
  --purple-light: #f5f3ff;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.12);
  --transition: .2s ease;
  color-scheme: light;
}

[data-theme="dark"] {
  --bg: #060a14;
  --surface: #0e1626;
  --surface2: #0a1120;
  --border: rgba(255,255,255,.09);
  --text: #e8eef7;
  --text2: #94a3b8;
  --text3: #56637a;
  --primary-light: rgba(34,211,238,.14);
  --success-light: rgba(34,197,94,.14);
  --warning-light: rgba(245,158,11,.14);
  --danger-light: rgba(239,68,68,.14);
  --purple-light: rgba(139,92,246,.14);
  --shadow: 0 1px 2px rgba(0,0,0,.35), 0 4px 16px rgba(0,0,0,.3);
  --shadow-lg: 0 20px 60px rgba(0,0,0,.55);
  color-scheme: dark;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
}
.hidden { display: none !important; }
button { font: inherit; cursor: pointer; }
input, select, textarea { font: inherit; }
a { color: var(--primary); }

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

/* ---------- Buttons ---------- */
.btn, .btn-ghost, .btn-danger, .btn-primary, .btn-success {
  display: inline-flex; align-items: center; gap: .35rem;
  border: 1px solid var(--border); background: var(--surface); color: var(--text);
  border-radius: var(--radius-sm); padding: .5rem .9rem; font-size: .9rem;
  transition: var(--transition); white-space: nowrap;
}
.btn:hover, .btn-ghost:hover { background: var(--surface2); }
.btn-sm { padding: .35rem .6rem; font-size: .82rem; }
.btn-lg { padding: .75rem 1.5rem; font-size: 1.05rem; }
.btn-ghost { background: transparent; border-color: transparent; }
.btn-primary { background: var(--primary); border-color: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-success { background: var(--success); border-color: var(--success); color: #fff; }
.btn-danger { background: var(--danger); border-color: var(--danger); color: #fff; }
.btn-danger:hover { filter: brightness(.92); }
.btn-icon { padding: .4rem .55rem; }
.btn:disabled { opacity: .5; cursor: not-allowed; }

.field { margin-bottom: .75rem; }
.field label { display: block; font-size: .82rem; color: var(--text2); margin-bottom: .3rem; }
.field input, .field select, .field textarea {
  width: 100%; padding: .6rem .7rem; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--surface2); color: var(--text);
}
.field textarea { resize: vertical; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
@media (max-width: 420px) { .form-row { grid-template-columns: 1fr; } }

.card {
  background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 1rem; margin-bottom: .8rem;
}
.card h2 { font-size: 1rem; margin-bottom: .7rem; }
.card h3 { font-size: .92rem; margin-bottom: .6rem; color: var(--text2); }

.tabs { display: flex; gap: .35rem; flex-wrap: wrap; margin-bottom: .8rem; }
.tab-btn {
  border: 1px solid var(--border); background: var(--surface); color: var(--text2);
  border-radius: 99px; padding: .4rem .85rem; font-size: .8rem; position: relative;
}
.tab-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.tab-count {
  display: inline-block; min-width: 1.2rem; text-align: center; margin-left: .3rem;
  background: rgba(0,0,0,.12); border-radius: 99px; padding: 0 .35rem; font-size: .72rem;
}
.tab-btn.active .tab-count { background: rgba(255,255,255,.25); }

.list-empty { color: var(--text3); font-size: .86rem; padding: 1rem 0; text-align: center; }

.row {
  display: flex; align-items: flex-start; justify-content: space-between; gap: .75rem;
  border: 1px solid var(--border); border-radius: var(--radius-sm); padding: .65rem .8rem;
  margin-bottom: .5rem; background: var(--surface);
}
.row-main { min-width: 0; }
.row-title { font-weight: 600; font-size: .92rem; }
.row-sub { font-size: .78rem; color: var(--text2); margin-top: .15rem; }
.row-note { font-size: .78rem; color: var(--text2); margin-top: .25rem; font-style: italic; }
.row-actions { display: flex; gap: .4rem; flex-shrink: 0; }
.badge { display: inline-block; padding: .12rem .5rem; border-radius: 99px; font-size: .7rem; font-weight: 600; }
.badge-warning { background: var(--warning-light); color: var(--warning); }
.badge-success { background: var(--success-light); color: var(--success); }
.badge-purple { background: var(--purple-light); color: var(--purple); }
.badge-danger { background: var(--danger-light); color: var(--danger); }

.sectors-manage-row { display: flex; align-items: center; gap: .5rem; margin-bottom: .5rem; }
.sectors-manage-row input { flex: 1; }

.role-buttons { display: flex; flex-direction: column; gap: .6rem; margin-top: 1rem; }
.role-btn {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  border-radius: var(--radius); padding: .8rem 1rem; font-size: .95rem; transition: var(--transition);
  text-align: left; display: flex; align-items: center; gap: .6rem;
}
.role-btn:hover { background: var(--primary-light); border-color: var(--primary); }
.role-btn.admin { border-color: var(--purple); }
.role-btn.admin:hover { background: var(--purple-light); }
.hint { color: var(--text2); font-size: .86rem; margin-bottom: .3rem; }
.error-text { color: var(--danger); font-size: .84rem; margin-top: .5rem; }

/* ---------- The one floating overlay window ---------- */
.app-window {
  position: fixed; right: 1.3rem; bottom: 1.3rem; z-index: 40;
  width: min(400px, calc(100vw - 2rem));
  max-height: min(82vh, 680px);
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  box-shadow: var(--shadow-lg); display: flex; flex-direction: column; overflow: hidden;
}
.app-window-header {
  cursor: move; user-select: none; touch-action: none;
  display: flex; align-items: center; justify-content: space-between; gap: .5rem;
  padding: .65rem .5rem .65rem .9rem; border-bottom: 1px solid var(--border); background: var(--surface2);
  flex-shrink: 0;
}
.app-window-title { display: flex; align-items: center; gap: .5rem; min-width: 0; flex-wrap: wrap; }
.brand { font-weight: 700; font-size: .98rem; white-space: nowrap; }
.role-label {
  font-size: .78rem; color: var(--text2); background: var(--surface);
  border: 1px solid var(--border); padding: .15rem .55rem; border-radius: 99px; white-space: nowrap;
}
.app-window-controls { display: flex; align-items: center; gap: .25rem; flex-shrink: 0; }
.conn-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
.conn-dot.online { background: var(--success); box-shadow: 0 0 0 3px var(--success-light); }
.conn-dot.offline { background: var(--warning); box-shadow: 0 0 0 3px var(--warning-light); }

.app-window-body { padding: .9rem; overflow-y: auto; }

/* ---------- Minimized launcher ---------- */
.fab {
  position: fixed; right: 1.3rem; bottom: 1.3rem; z-index: 30;
  width: 58px; height: 58px; border-radius: 50%; background: var(--primary); color: #fff;
  border: none; box-shadow: var(--shadow-lg); display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem; transition: var(--transition);
}
.fab:hover { background: var(--primary-dark); transform: scale(1.05); }
.fab-badge {
  position: absolute; top: -4px; right: -4px; background: var(--danger); color: #fff;
  border-radius: 99px; min-width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
  font-size: .72rem; font-weight: 700; padding: 0 .3rem; border: 2px solid var(--bg);
}

/* ---------- Urgent full-screen alert (separate from the app window) ---------- */
.urgent-overlay {
  position: fixed; inset: 0; z-index: 60;
  background: radial-gradient(circle at 50% 30%, rgba(239,68,68,.35), rgba(6,10,20,.92));
  display: flex; align-items: center; justify-content: center; padding: 1.5rem;
  animation: urgent-pulse 1.4s ease-in-out infinite;
}
@keyframes urgent-pulse {
  0%, 100% { background-color: rgba(6,10,20,.92); }
  50% { background-color: rgba(40,6,6,.92); }
}
.urgent-card {
  background: var(--surface); border-radius: 20px; padding: 2.2rem 1.8rem; max-width: 480px; width: 100%;
  text-align: center; box-shadow: var(--shadow-lg); border: 2px solid var(--danger);
}
.urgent-icon { font-size: 2.6rem; margin-bottom: .5rem; }
.urgent-from { font-size: .85rem; color: var(--text2); margin-bottom: .5rem; }
.urgent-text { font-size: 1.15rem; font-weight: 600; margin-bottom: 1.4rem; white-space: pre-wrap; color: var(--text); }
</style>
</head>
<body>

<div id="app-window" class="app-window">
  <div id="app-window-header" class="app-window-header">
    <div class="app-window-title">
      <span class="brand">🧪 SektorLink</span>
      <span id="role-label" class="role-label hidden"></span>
    </div>
    <div class="app-window-controls">
      <span id="conn-dot" class="conn-dot hidden"></span>
      <button id="urgent-shortcut-btn" class="btn-danger btn-sm btn-icon hidden" title="Hitna poruka">📢</button>
      <button id="theme-toggle" class="btn-ghost btn-sm btn-icon" title="Tema">🌙</button>
      <button id="minimize-btn" class="btn-ghost btn-sm btn-icon hidden" title="Umanji">─</button>
    </div>
  </div>

  <div id="app-window-body" class="app-window-body">

    <div id="connect-content">
      <p class="hint">Unesite pristupni kod da se povežete na server</p>
      <form id="connect-form">
        <div class="field">
          <label>Pristupni kod</label>
          <input id="connect-code" autocomplete="off" required>
        </div>
        <div id="connect-error" class="error-text hidden"></div>
        <button type="submit" class="btn-primary" style="width:100%;justify-content:center;margin-top:.3rem">Poveži se</button>
      </form>
    </div>

    <div id="role-content" class="hidden">
      <p class="hint">Izaberite ko ste na ovom računaru</p>
      <div id="role-buttons" class="role-buttons"></div>
    </div>

    <div id="app-content" class="hidden">
      <div id="app-tabs" class="tabs"></div>
      <div id="app-main"></div>
    </div>

  </div>
</div>

<button id="fab" class="fab hidden" title="Otvori SektorLink">
  🧪<span id="fab-badge" class="fab-badge hidden">0</span>
</button>

<div id="urgent-overlay" class="urgent-overlay hidden">
  <div class="urgent-card">
    <div class="urgent-icon">🚨</div>
    <div id="urgent-from" class="urgent-from"></div>
    <div id="urgent-text" class="urgent-text"></div>
    <button id="urgent-ok" class="btn-danger btn-lg">U redu</button>
  </div>
</div>

<script>
/* ================================================================
   STATE
   ================================================================ */
let sectors = {};   // { id: { id, name, order } }
let patients = {};  // { id: { id, patientNumber, patientName, sectorId, direction, reason, note, status, createdAt, updatedAt, createdBy } }
let messages = {};  // { id: { id, text, from, to, ts } }
let myRole = null;  // { type: 'admin' } | { type: 'sector', sectorId }

let currentScreen = 'connect'; // 'connect' | 'role' | 'app'
let activeTab = 'new';

const tabLoadTs = Date.now();
const alertedMessageIds = new Set();
let urgentQueue = [];
let urgentShowing = false;

function $(sel) { return document.querySelector(sel); }

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => (
    { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
  ));
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function formatTime(ts) {
  return new Date(ts).toLocaleString('sr-RS', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
}

function reasonLabel(r) {
  if (r === 'ponavljanje') return 'Ponavljanje';
  if (r === 'nije-uradjeno') return 'Nije urađeno';
  if (r === 'spreman-za-pregled') return 'Spreman za pregled';
  return r || '';
}

function sectorName(id) {
  return (sectors[id] && sectors[id].name) || 'Nepoznat sektor';
}

/* ================================================================
   LOCAL STORAGE (warm-start cache — shown instantly on load, then
   replaced by whatever the server sends right after connecting)
   ================================================================ */
function loadLocalState() {
  sectors = JSON.parse(localStorage.getItem('sf_sectors') || '{}');
  patients = JSON.parse(localStorage.getItem('sf_patients') || '{}');
  messages = JSON.parse(localStorage.getItem('sf_messages') || '{}');
}

function saveLocalSectors() { localStorage.setItem('sf_sectors', JSON.stringify(sectors)); }
function saveLocalPatients() { localStorage.setItem('sf_patients', JSON.stringify(patients)); }
function saveLocalMessages() { localStorage.setItem('sf_messages', JSON.stringify(messages)); }

/* ================================================================
   WEBSOCKET CONNECTION (server is same-origin — the page was loaded
   from it, so location.host is always the right address to dial)
   ================================================================ */
let ws = null;
let wsCode = '';
let hasConnectedOnce = false;
let reconnectTimer = null;

function wsUrl(code) {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  return proto + '//' + location.host + '/?code=' + encodeURIComponent(code);
}

function wsSend(msg) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(msg));
}

function connectWs(code) {
  wsCode = code;
  clearTimeout(reconnectTimer);
  try { if (ws) ws.close(); } catch (e) {}
  ws = new WebSocket(wsUrl(code));
  ws.onclose = ev => {
    updateConnDot(false);
    if (!hasConnectedOnce) {
      const msg = ev.code === 4001 ? 'Pogrešan pristupni kod.' : 'Ne mogu da se povežem na server. Proveri da li je server pokrenut i da li si na istoj mreži.';
      showConnectScreen(msg);
      if (ev.code === 4001) return;
    }
    reconnectTimer = setTimeout(() => connectWs(wsCode), 3000);
  };
  ws.onmessage = ev => handleWsMessage(ev.data);
}

function handleWsMessage(raw) {
  let msg;
  try { msg = JSON.parse(raw); } catch (e) { return; }

  if (msg.type === 'init') {
    hasConnectedOnce = true;
    updateConnDot(true);
    sectors = msg.sectors || {}; patients = msg.patients || {}; messages = msg.messages || {};
    saveLocalSectors(); saveLocalPatients(); saveLocalMessages();
    localStorage.setItem('sf_code', wsCode);
    if (currentScreen === 'connect') navigateAfterConnect();
    else onStateChanged();
    return;
  }
  if (msg.type === 'update') {
    if (msg.collection === 'sectors') { sectors[msg.id] = msg.data; saveLocalSectors(); }
    else if (msg.collection === 'patients') { patients[msg.id] = msg.data; saveLocalPatients(); }
    else if (msg.collection === 'messages') { messages[msg.id] = msg.data; saveLocalMessages(); }
  } else if (msg.type === 'remove') {
    if (msg.collection === 'sectors') { delete sectors[msg.id]; saveLocalSectors(); }
    else if (msg.collection === 'patients') { delete patients[msg.id]; saveLocalPatients(); }
    else if (msg.collection === 'messages') { delete messages[msg.id]; saveLocalMessages(); }
  }
  onStateChanged();
}

function navigateAfterConnect() {
  const savedRole = JSON.parse(localStorage.getItem('sf_role') || 'null');
  if (savedRole && (savedRole.type === 'admin' || sectors[savedRole.sectorId])) {
    myRole = savedRole;
    showAppScreen();
  } else {
    showRoleScreen();
  }
}

function onStateChanged() {
  if (currentScreen === 'role') renderRoleScreen();
  else if (currentScreen === 'app') render();
}

function updateConnDot(connected) {
  const dot = $('#conn-dot'); if (!dot) return;
  if (connected) { dot.className = 'conn-dot online'; dot.title = 'Povezano na server — uživo sa svim računarima'; }
  else { dot.className = 'conn-dot offline'; dot.title = 'Nije povezano na server — pokušavam ponovo...'; }
}

/* ================================================================
   DATA MUTATIONS
   ================================================================ */
function setSector(id, data) { sectors[id] = data; saveLocalSectors(); wsSend({ type: 'mutate', collection: 'sectors', id, data }); render(); }
function removeSector(id) { delete sectors[id]; saveLocalSectors(); wsSend({ type: 'remove', collection: 'sectors', id }); render(); }

function setPatient(id, data) { patients[id] = data; saveLocalPatients(); wsSend({ type: 'mutate', collection: 'patients', id, data }); render(); }
function removePatient(id) { delete patients[id]; saveLocalPatients(); wsSend({ type: 'remove', collection: 'patients', id }); render(); }

function setMessage(id, data) { messages[id] = data; saveLocalMessages(); wsSend({ type: 'mutate', collection: 'messages', id, data }); render(); }

function addPatientToSector(number, name, sectorId, reason, note) {
  const id = uid();
  setPatient(id, {
    id, patientNumber: number, patientName: name, sectorId, reason, note,
    direction: 'toSector', status: 'pending',
    createdAt: Date.now(), updatedAt: Date.now(), createdBy: 'admin'
  });
}

function sendReadyForExam(number, name, note) {
  const id = uid();
  setPatient(id, {
    id, patientNumber: number, patientName: name, sectorId: myRole.sectorId, reason: 'spreman-za-pregled', note,
    direction: 'toAdmin', status: 'pending',
    createdAt: Date.now(), updatedAt: Date.now(), createdBy: myRole.sectorId
  });
}

function markDone(id) {
  const p = patients[id]; if (!p) return;
  setPatient(id, { ...p, status: 'done', updatedAt: Date.now() });
}
function closeItem(id) {
  const p = patients[id]; if (!p) return;
  setPatient(id, { ...p, status: 'closed', updatedAt: Date.now() });
}
function deletePatientRow(id) {
  if (!confirm('Obrisati ovaj unos?')) return;
  removePatient(id);
}

function sendUrgentMessage(text, to) {
  const id = uid();
  const from = myRole.type === 'admin' ? 'Administrator' : sectorName(myRole.sectorId);
  const data = { id, text, from, to, ts: Date.now() };
  alertedMessageIds.add(id);
  setMessage(id, data);
}

/* ================================================================
   ROLE SELECTION
   ================================================================ */
function chooseRole(role) {
  myRole = role;
  localStorage.setItem('sf_role', JSON.stringify(role));
  showAppScreen();
}

function changeRole() {
  myRole = null;
  localStorage.removeItem('sf_role');
  showRoleScreen();
}

function changeCode() {
  clearTimeout(reconnectTimer);
  try { if (ws) ws.close(); } catch (e) {}
  ws = null;
  hasConnectedOnce = false;
  $('#connect-code').value = wsCode || '';
  showConnectScreen();
}

/* ================================================================
   SCREENS (all rendered inside the one floating app-window)
   ================================================================ */
function showConnectScreen(errorMsg) {
  currentScreen = 'connect';
  $('#connect-content').classList.remove('hidden');
  $('#role-content').classList.add('hidden');
  $('#app-content').classList.add('hidden');
  $('#role-label').classList.add('hidden');
  $('#conn-dot').classList.add('hidden');
  $('#urgent-shortcut-btn').classList.add('hidden');
  $('#minimize-btn').classList.add('hidden');
  maximizeWindow();
  const err = $('#connect-error');
  if (errorMsg) { err.textContent = errorMsg; err.classList.remove('hidden'); }
  else { err.classList.add('hidden'); }
}

function showRoleScreen() {
  currentScreen = 'role';
  $('#connect-content').classList.add('hidden');
  $('#role-content').classList.remove('hidden');
  $('#app-content').classList.add('hidden');
  $('#role-label').classList.add('hidden');
  $('#conn-dot').classList.remove('hidden');
  $('#urgent-shortcut-btn').classList.add('hidden');
  $('#minimize-btn').classList.add('hidden');
  maximizeWindow();
  renderRoleScreen();
}

function showAppScreen() {
  currentScreen = 'app';
  $('#connect-content').classList.add('hidden');
  $('#role-content').classList.add('hidden');
  $('#app-content').classList.remove('hidden');
  $('#role-label').classList.remove('hidden');
  $('#conn-dot').classList.remove('hidden');
  $('#urgent-shortcut-btn').classList.remove('hidden');
  $('#minimize-btn').classList.remove('hidden');
  activeTab = myRole.type === 'admin' ? 'new' : 'queue';
  maximizeWindow();
  render();
}

/* ---------- Minimize / restore the floating window ---------- */
function minimizeWindow() {
  $('#app-window').classList.add('hidden');
  if (currentScreen === 'app') { $('#fab').classList.remove('hidden'); renderFab(); }
}
function maximizeWindow() {
  $('#app-window').classList.remove('hidden');
  $('#fab').classList.add('hidden');
}

/* ================================================================
   RENDER
   ================================================================ */
function render() {
  if (currentScreen !== 'app') return;
  $('#role-label').textContent = myRole.type === 'admin' ? 'Administrator' : sectorName(myRole.sectorId);
  renderAppTabs();
  renderAppMain();
  renderFab();
  processMessages();
}

function renderRoleScreen() {
  const box = $('#role-buttons');
  let html = `<button class="role-btn admin" onclick='chooseRole({"type":"admin"})'>👑 Administrator</button>`;
  const sectorList = Object.values(sectors).sort((a, b) => (a.order || 0) - (b.order || 0));
  if (sectorList.length) {
    sectorList.forEach(s => {
      html += `<button class="role-btn" onclick='chooseRole({"type":"sector","sectorId":"${s.id}"})'>🧪 ${esc(s.name)}</button>`;
    });
  } else {
    html += `<div class="hint">Nema još definisanih sektora. Administrator prvo treba da ih doda (tab "Podešavanja" u aplikaciji).</div>`;
  }
  box.innerHTML = html;
  processMessages();
}

/* ---------- Tabs ---------- */
function renderAppTabs() {
  const box = $('#app-tabs');
  let tabs;
  if (myRole.type === 'admin') {
    const sentPending = Object.values(patients).filter(p => p.direction === 'toSector' && p.status === 'pending');
    const review = Object.values(patients).filter(p => p.direction === 'toSector' && p.status === 'done');
    const ready = Object.values(patients).filter(p => p.direction === 'toAdmin' && p.status === 'pending');
    tabs = [
      ['new', 'Novi pacijent', null],
      ['sent', 'Poslato sektorima', sentPending.length],
      ['review', 'Vraćeno na proveru', review.length],
      ['ready', 'Spremni za pregled', ready.length],
      ['history', 'Istorija', null],
      ['messages', 'Poruke', unreadMessagesCount()],
      ['settings', 'Podešavanja', null],
    ];
  } else {
    const queue = Object.values(patients).filter(p => p.sectorId === myRole.sectorId && p.direction === 'toSector' && p.status === 'pending');
    tabs = [
      ['queue', 'Na čekanju', queue.length],
      ['send', 'Pošalji spremnog', null],
      ['history', 'Istorija', null],
      ['messages', 'Poruke', unreadMessagesCount()],
      ['settings', 'Podešavanja', null],
    ];
  }
  box.innerHTML = tabs.map(([key, label, count]) => `
    <button class="tab-btn ${activeTab === key ? 'active' : ''}" data-tab-key="${key}">
      ${label}${count !== null ? `<span class="tab-count">${count}</span>` : ''}
    </button>`).join('');
  box.querySelectorAll('[data-tab-key]').forEach(btn => {
    btn.onclick = () => { activeTab = btn.dataset.tabKey; render(); };
  });
}

/* ---------- Main tab content ---------- */
function renderAppMain() {
  const main = $('#app-main');
  if (myRole.type === 'admin') {
    const sentPending = Object.values(patients).filter(p => p.direction === 'toSector' && p.status === 'pending');
    const review = Object.values(patients).filter(p => p.direction === 'toSector' && p.status === 'done');
    const ready = Object.values(patients).filter(p => p.direction === 'toAdmin' && p.status === 'pending');
    const history = Object.values(patients).filter(p => p.status === 'closed').sort((a, b) => b.updatedAt - a.updatedAt);

    if (activeTab === 'new') main.innerHTML = newPatientFormHtml();
    else if (activeTab === 'sent') main.innerHTML = patientListHtml(sentPending, 'sent');
    else if (activeTab === 'review') main.innerHTML = patientListHtml(review, 'review');
    else if (activeTab === 'ready') main.innerHTML = patientListHtml(ready, 'ready');
    else if (activeTab === 'history') main.innerHTML = historyListHtml(history, true);
    else if (activeTab === 'messages') { main.innerHTML = messagesTabHtml(); localStorage.setItem('sf_last_msg_view', String(Date.now())); }
    else if (activeTab === 'settings') main.innerHTML = settingsTabHtml();
  } else {
    const queue = Object.values(patients)
      .filter(p => p.sectorId === myRole.sectorId && p.direction === 'toSector' && p.status === 'pending')
      .sort((a, b) => a.createdAt - b.createdAt);
    const history = Object.values(patients)
      .filter(p => p.sectorId === myRole.sectorId && p.status === 'closed')
      .sort((a, b) => b.updatedAt - a.updatedAt).slice(0, 30);

    if (activeTab === 'queue') main.innerHTML = patientListHtml(queue, 'sector-queue');
    else if (activeTab === 'send') main.innerHTML = sendReadyFormHtml();
    else if (activeTab === 'history') main.innerHTML = historyListHtml(history, false);
    else if (activeTab === 'messages') { main.innerHTML = messagesTabHtml(); localStorage.setItem('sf_last_msg_view', String(Date.now())); }
    else if (activeTab === 'settings') main.innerHTML = settingsTabHtml();
  }
  wireMainEvents();
}

function newPatientFormHtml() {
  const sectorOptions = Object.values(sectors).sort((a, b) => (a.order || 0) - (b.order || 0))
    .map(s => `<option value="${s.id}">${esc(s.name)}</option>`).join('');
  return `
  <div class="card">
    <h2>Novi pacijent za sektor</h2>
    <form id="new-patient-form">
      <div class="form-row">
        <div class="field"><label>Broj pacijenta</label><input id="np-number" required></div>
        <div class="field"><label>Ime i prezime</label><input id="np-name" required></div>
      </div>
      <div class="form-row">
        <div class="field"><label>Sektor</label><select id="np-sector" required>${sectorOptions || '<option value="">Nema sektora</option>'}</select></div>
        <div class="field"><label>Razlog</label>
          <select id="np-reason">
            <option value="ponavljanje">Ponavljanje</option>
            <option value="nije-uradjeno">Nije urađeno</option>
          </select>
        </div>
      </div>
      <div class="field"><label>Napomena (opciono)</label><textarea id="np-note" rows="2"></textarea></div>
      <button type="submit" class="btn-primary">Pošalji sektoru</button>
    </form>
  </div>`;
}

function sendReadyFormHtml() {
  return `
  <div class="card">
    <h2>Pošalji pacijenta spremnog za pregled</h2>
    <form id="ready-form">
      <div class="form-row">
        <div class="field"><label>Broj pacijenta</label><input id="rf-number" required></div>
        <div class="field"><label>Ime i prezime</label><input id="rf-name" required></div>
      </div>
      <div class="field"><label>Napomena (opciono)</label><textarea id="rf-note" rows="2"></textarea></div>
      <button type="submit" class="btn-primary">Pošalji adminu</button>
    </form>
  </div>`;
}

function patientListHtml(list, ctx) {
  if (!list.length) return `<div class="card"><div class="list-empty">Nema stavki.</div></div>`;
  list = list.slice().sort((a, b) => b.updatedAt - a.updatedAt);
  return `<div class="card">${list.map(p => patientRowHtml(p, ctx)).join('')}</div>`;
}

function historyListHtml(list, showSearch) {
  const searchBox = showSearch ? `<div class="field"><input id="hist-search" placeholder="Pretraga po broju ili imenu..."></div>` : '';
  const rows = list.length ? list.map(p => patientRowHtml(p, 'history')).join('') : `<div class="list-empty">Nema zatvorenih stavki.</div>`;
  return `<div class="card">${searchBox}<div id="hist-rows">${rows}</div></div>`;
}

function patientRowHtml(p, ctx) {
  const isToSector = p.direction === 'toSector';
  const typeLabel = isToSector ? `→ ${esc(sectorName(p.sectorId))}` : `${esc(sectorName(p.sectorId))} → Admin`;
  const badgeClass = p.reason === 'nije-uradjeno' ? 'badge-danger' : (p.reason === 'spreman-za-pregled' ? 'badge-purple' : 'badge-warning');
  let actions = '';
  if (ctx === 'sent') {
    actions = `<button class="btn-ghost btn-sm" onclick="deletePatientRow('${p.id}')" title="Obriši">🗑️</button>`;
  } else if (ctx === 'sector-queue') {
    actions = `<button class="btn-success btn-sm" onclick="markDone('${p.id}')">Odrađeno ✓</button>`;
  } else if (ctx === 'review' || ctx === 'ready') {
    actions = `<button class="btn-primary btn-sm" onclick="closeItem('${p.id}')">Zatvori</button>`;
  }
  return `
  <div class="row">
    <div class="row-main">
      <div class="row-title">${esc(p.patientNumber)} — ${esc(p.patientName)}</div>
      <div class="row-sub"><span class="badge ${badgeClass}">${reasonLabel(p.reason)}</span> · ${typeLabel} · ${formatTime(p.updatedAt)}</div>
      ${p.note ? `<div class="row-note">${esc(p.note)}</div>` : ''}
    </div>
    <div class="row-actions">${actions}</div>
  </div>`;
}

/* ---------- Messages tab (list + compose, replaces old modal) ---------- */
function messagesTabHtml() {
  const list = Object.values(messages).filter(isMessageForMe).sort((a, b) => b.ts - a.ts).slice(0, 50);
  const toOptions = `<option value="all">Svi</option>` + (myRole.type === 'admin'
    ? Object.values(sectors).sort((a, b) => (a.order || 0) - (b.order || 0)).map(s => `<option value="${s.id}">${esc(s.name)}</option>`).join('')
    : `<option value="admin">Administrator</option>`);
  const rows = list.length ? list.map(m => `
    <div class="row">
      <div class="row-main">
        <div class="row-title">${esc(m.from)}</div>
        <div class="row-sub">${formatTime(m.ts)}</div>
        <div class="row-note">${esc(m.text)}</div>
      </div>
    </div>`).join('') : `<div class="list-empty">Nema poruka.</div>`;
  return `
  <div class="card">
    <h3>📢 Nova hitna poruka</h3>
    <div class="field"><label>Prima:</label><select id="compose-to">${toOptions}</select></div>
    <div class="field"><label>Poruka:</label><textarea id="compose-text" rows="2" placeholder="Unesite hitnu poruku..."></textarea></div>
    <button id="compose-send" class="btn-danger">Pošalji hitno</button>
  </div>
  <div class="card"><h3>Istorija poruka</h3>${rows}</div>`;
}

/* ---------- Settings tab (sectors mgmt + account, replaces old modal) ---------- */
function settingsTabHtml() {
  let html = '';
  if (myRole.type === 'admin') {
    html += `
    <div class="card">
      <h3>⚙️ Sektori</h3>
      <div id="sectors-list"></div>
      <div class="sectors-manage-row">
        <input id="new-sector-name" placeholder="Naziv novog sektora...">
        <button id="add-sector-btn" class="btn-primary btn-sm">Dodaj</button>
      </div>
    </div>`;
  }
  html += `
  <div class="card">
    <h3>Nalog</h3>
    <div style="display:flex;flex-direction:column;gap:.5rem;align-items:flex-start">
      <button id="change-code-btn" class="btn-ghost btn-sm">Promeni kod</button>
      <button id="change-role-btn" class="btn-ghost btn-sm">Promeni ulogu</button>
    </div>
  </div>`;
  return html;
}

function renderSectorsList() {
  const list = Object.values(sectors).sort((a, b) => (a.order || 0) - (b.order || 0));
  $('#sectors-list').innerHTML = list.length ? list.map(s => `
    <div class="sectors-manage-row">
      <input value="${esc(s.name)}" onchange="renameSector('${s.id}', this.value)">
      <button class="btn-ghost btn-sm btn-icon" onclick="deleteSectorConfirm('${s.id}')" title="Obriši">🗑️</button>
    </div>`).join('') : `<div class="list-empty">Nema sektora — dodajte prvi ispod.</div>`;
}

function renameSector(id, newName) {
  newName = newName.trim();
  if (!newName || !sectors[id]) return;
  setSector(id, { ...sectors[id], name: newName });
  renderSectorsList();
}

function deleteSectorConfirm(id) {
  const hasActive = Object.values(patients).some(p => p.sectorId === id && p.status !== 'closed');
  if (hasActive && !confirm('Ovaj sektor ima aktivne pacijente. Obrisati ga ipak?')) return;
  if (!hasActive && !confirm('Obrisati ovaj sektor?')) return;
  removeSector(id);
  renderSectorsList();
}

function addSector() {
  const input = $('#new-sector-name');
  const name = input.value.trim();
  if (!name) return;
  const id = uid();
  setSector(id, { id, name, order: Object.keys(sectors).length });
  input.value = '';
  renderSectorsList();
}

/* ---------- Wiring for whatever is currently in #app-main ---------- */
function wireMainEvents() {
  if (myRole.type === 'admin') {
    if (activeTab === 'new') {
      const form = $('#new-patient-form');
      if (form) form.onsubmit = e => {
        e.preventDefault();
        const number = $('#np-number').value.trim();
        const name = $('#np-name').value.trim();
        const sectorId = $('#np-sector').value;
        const reason = $('#np-reason').value;
        const note = $('#np-note').value.trim();
        if (!number || !name || !sectorId) return;
        addPatientToSector(number, name, sectorId, reason, note);
      };
    } else if (activeTab === 'history') {
      wireHistorySearch();
    } else if (activeTab === 'messages') {
      wireMessagesTab();
    } else if (activeTab === 'settings') {
      wireSettingsTab();
    }
  } else {
    if (activeTab === 'send') {
      const form = $('#ready-form');
      if (form) form.onsubmit = e => {
        e.preventDefault();
        const number = $('#rf-number').value.trim();
        const name = $('#rf-name').value.trim();
        const note = $('#rf-note').value.trim();
        if (!number || !name) return;
        sendReadyForExam(number, name, note);
        form.reset();
      };
    } else if (activeTab === 'messages') {
      wireMessagesTab();
    } else if (activeTab === 'settings') {
      wireSettingsTab();
    }
  }
}

function wireHistorySearch() {
  const searchBox = $('#hist-search');
  if (!searchBox) return;
  searchBox.oninput = () => {
    const q = searchBox.value.trim().toLowerCase();
    const list = Object.values(patients).filter(p => p.status === 'closed' &&
      (p.patientNumber.toLowerCase().includes(q) || p.patientName.toLowerCase().includes(q)))
      .sort((a, b) => b.updatedAt - a.updatedAt);
    $('#hist-rows').innerHTML = list.length ? list.map(p => patientRowHtml(p, 'history')).join('') : '<div class="list-empty">Nema rezultata.</div>';
  };
}

function wireMessagesTab() {
  const send = $('#compose-send');
  if (send) send.onclick = () => {
    const text = $('#compose-text').value.trim();
    const to = $('#compose-to').value;
    if (!text) return;
    sendUrgentMessage(text, to);
  };
}

function wireSettingsTab() {
  if (myRole.type === 'admin') {
    renderSectorsList();
    const addBtn = $('#add-sector-btn');
    if (addBtn) addBtn.onclick = addSector;
    const nameInput = $('#new-sector-name');
    if (nameInput) nameInput.onkeydown = e => { if (e.key === 'Enter') addSector(); };
  }
  const codeBtn = $('#change-code-btn');
  if (codeBtn) codeBtn.onclick = changeCode;
  const roleBtn = $('#change-role-btn');
  if (roleBtn) roleBtn.onclick = changeRole;
}

/* ---------- Minimized launcher badge ---------- */
function fabBadgeCount() {
  let queueCount = 0;
  if (myRole.type === 'admin') {
    queueCount = Object.values(patients).filter(p =>
      (p.direction === 'toSector' && p.status === 'done') ||
      (p.direction === 'toAdmin' && p.status === 'pending')).length;
  } else {
    queueCount = Object.values(patients).filter(p =>
      p.sectorId === myRole.sectorId && p.direction === 'toSector' && p.status === 'pending').length;
  }
  return queueCount + unreadMessagesCount();
}

function unreadMessagesCount() {
  const lastView = Number(localStorage.getItem('sf_last_msg_view') || 0);
  return Object.values(messages).filter(m => isMessageForMe(m) && m.ts > lastView).length;
}

function renderFab() {
  const count = fabBadgeCount();
  const badge = $('#fab-badge');
  badge.textContent = count > 99 ? '99+' : count;
  badge.classList.toggle('hidden', count === 0);
}

/* ---------- Messages / urgent alert ---------- */
function isMessageForMe(m) {
  if (!myRole) return false;
  if (myRole.type === 'admin') return m.to === 'all' || m.to === 'admin';
  return m.to === 'all' || m.to === myRole.sectorId;
}

function processMessages() {
  const relevant = Object.values(messages).filter(isMessageForMe).sort((a, b) => a.ts - b.ts);
  relevant.forEach(m => {
    if (alertedMessageIds.has(m.id)) return;
    alertedMessageIds.add(m.id);
    if (m.ts > tabLoadTs) urgentQueue.push(m);
  });
  if (!urgentShowing) showNextUrgent();
}

function showNextUrgent() {
  if (!urgentQueue.length) { urgentShowing = false; return; }
  urgentShowing = true;
  const m = urgentQueue.shift();
  $('#urgent-from').textContent = m.from + ' • ' + formatTime(m.ts);
  $('#urgent-text').textContent = m.text;
  $('#urgent-overlay').classList.remove('hidden');
  playBeep();
}

function playBeep() {
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    const beep = (freq, delay) => setTimeout(() => {
      const ctx = new Ctx();
      const o = ctx.createOscillator(); const g = ctx.createGain();
      o.type = 'sine'; o.frequency.value = freq;
      g.gain.setValueAtTime(0.0001, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.3, ctx.currentTime + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.45);
      o.connect(g); g.connect(ctx.destination);
      o.start(); o.stop(ctx.currentTime + 0.5);
    }, delay);
    beep(880, 0);
    beep(1046, 260);
  } catch (e) { console.error('Zvuk nije uspeo:', e); }
}

/* ================================================================
   THEME
   ================================================================ */
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('sf_theme', theme);
  const t = $('#theme-toggle');
  if (t) t.textContent = theme === 'dark' ? '☀️' : '🌙';
}
function toggleTheme() {
  applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}

/* ================================================================
   DRAG (move the floating window anywhere on screen)
   ================================================================ */
let dragState = null;

function initDrag() {
  const header = $('#app-window-header');
  header.addEventListener('mousedown', dragStart);
  header.addEventListener('touchstart', dragStart, { passive: false });
}

function dragStart(e) {
  if (e.target.closest('button')) return;
  const win = $('#app-window');
  const rect = win.getBoundingClientRect();
  const point = e.touches ? e.touches[0] : e;
  dragState = { offX: point.clientX - rect.left, offY: point.clientY - rect.top };
  win.style.left = rect.left + 'px';
  win.style.top = rect.top + 'px';
  win.style.right = 'auto';
  win.style.bottom = 'auto';
  document.addEventListener('mousemove', dragMove);
  document.addEventListener('touchmove', dragMove, { passive: false });
  document.addEventListener('mouseup', dragEnd);
  document.addEventListener('touchend', dragEnd);
  e.preventDefault();
}

function dragMove(e) {
  if (!dragState) return;
  const point = e.touches ? e.touches[0] : e;
  const win = $('#app-window');
  const maxLeft = window.innerWidth - win.offsetWidth;
  const maxTop = window.innerHeight - win.offsetHeight;
  let left = point.clientX - dragState.offX;
  let top = point.clientY - dragState.offY;
  left = Math.max(0, Math.min(Math.max(maxLeft, 0), left));
  top = Math.max(0, Math.min(Math.max(maxTop, 0), top));
  win.style.left = left + 'px';
  win.style.top = top + 'px';
  e.preventDefault();
}

function dragEnd() {
  if (!dragState) return;
  dragState = null;
  document.removeEventListener('mousemove', dragMove);
  document.removeEventListener('touchmove', dragMove);
  document.removeEventListener('mouseup', dragEnd);
  document.removeEventListener('touchend', dragEnd);
  const win = $('#app-window');
  localStorage.setItem('sf_window_pos', JSON.stringify({ left: win.style.left, top: win.style.top }));
}

function restoreWindowPos() {
  const saved = JSON.parse(localStorage.getItem('sf_window_pos') || 'null');
  if (!saved) return;
  const win = $('#app-window');
  win.style.left = saved.left;
  win.style.top = saved.top;
  win.style.right = 'auto';
  win.style.bottom = 'auto';
}

/* ================================================================
   STATIC EVENT WIRING
   ================================================================ */
function wireStaticEvents() {
  $('#theme-toggle').onclick = toggleTheme;
  $('#minimize-btn').onclick = minimizeWindow;
  $('#fab').onclick = maximizeWindow;

  $('#connect-form').onsubmit = e => {
    e.preventDefault();
    const code = $('#connect-code').value.trim();
    if (!code) return;
    connectWs(code);
  };

  $('#urgent-shortcut-btn').onclick = () => {
    activeTab = 'messages';
    render();
    setTimeout(() => { const t = $('#compose-text'); if (t) t.focus(); }, 0);
  };

  $('#urgent-ok').onclick = () => { $('#urgent-overlay').classList.add('hidden'); showNextUrgent(); };

  initDrag();
}

/* ================================================================
   INIT
   ================================================================ */
function init() {
  applyTheme(localStorage.getItem('sf_theme') || 'light');
  loadLocalState();
  restoreWindowPos();
  wireStaticEvents();

  const savedCode = localStorage.getItem('sf_code');
  if (savedCode) {
    $('#connect-code').value = savedCode;
    connectWs(savedCode);
  } else {
    showConnectScreen();
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
